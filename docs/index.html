<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>枫叶指令宏文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --sidebar-w: 240px;
      --accent: #007acc;
      --bg-main: #ffffff;
      --bg-side: #ffffff;
      --text-main: #333;
      --text-sub: #666;
      --border: #e1e4e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #f6f8fa !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }

    /* 左侧边栏（docsify 原生） */
    .sidebar {
      width: var(--sidebar-w) !important;
      background: var(--bg-side) !important;
      border-right: 1px solid var(--border) !important;
      padding-top: 0 !important;
      transform: none !important;
      transition: none !important;
    }
    .sidebar > h1 {
      margin: 0;
      padding: 20px 16px;
      font-size: 16px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 9;
      background: var(--bg-side);
    }
    .sidebar ul li a {
      font-size: 14px;
      padding: 8px 16px;
      margin: 2px 12px;
      border-radius: 6px;
      color: var(--text-main);
      transition: all 0.2s ease;
      display: block;
    }
    .sidebar ul li a:hover {
      background-color: #f3f4f6;
      text-decoration: none;
    }
    .sidebar ul li a.active {
      background-color: var(--accent) !important;
      color: white !important;
      font-weight: 500;
    }
    .sidebar ul ul {
      padding-left: 12px;
      margin-left: 12px;
      border-left: 1px solid var(--border);
    }

    /* 主内容区：完全占据右侧，不留空白 */
    .content {
      left: var(--sidebar-w) !important;
      right: 0 !important;           /* 原来为 calc(...)，现改为0 */
      padding-top: 20px !important;
      padding-bottom: 40px !important;
      background: transparent !important;
      transform: none !important;
      transition: none !important;
    }
    .markdown-section {
      max-width: none !important;
      margin: 0 20px !important;      /* 左右留一点边距，美观 */
      padding: 32px !important;
      background: var(--bg-main) !important;
      border-radius: 8px !important;
      border: 1px solid var(--border) !important;
      min-height: calc(100vh - 60px) !important;
    }

    /* 滚动条美化（仅侧边栏） */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .content {
        left: 0 !important;
        padding: 0 !important;
      }
      .markdown-section {
        margin: 0 !important;
        border-radius: 0 !important;
        border: none !important;
        padding: 20px 16px !important;
      }
      .sidebar {
        transform: translateX(-var(--sidebar-w)) !important;
      }
      .sidebar.show {
        transform: translateX(0) !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📄 枫叶指令宏文档',
      loadSidebar: true,
      subMaxLevel: 4,
      emoji: true,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 4
      }
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
