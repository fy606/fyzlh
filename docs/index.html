<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>枫叶指令宏文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-toc@1/dist/toc.css">
  <!-- 自定义侧边栏样式 -->
  <style>
    .sidebar {
      width: 260px;
    }
    .sidebar ul li a {
      font-size: 13px;
      padding: 6px 12px;
    }
    .content {
      left: 260px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📄 枫叶指令宏文档',
      loadSidebar: true,
      subMaxLevel: 3,
      emoji: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 3
      },
      // 新增：目录插件配置
      toc: {
        scope: '.markdown-section', // 指定目录提取的范围
        maxDepth: 3,                // 提取到三级标题 (###)
        title: '本页目录'           // 目录标题（可选）
      }
    }
  </script>
  <!-- 加载 docsify 核心文件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 加载搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 加载 emoji 插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <!-- 加载图片缩放插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <!-- 新增：加载目录插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-toc@1"></script>
</body>
</html>
