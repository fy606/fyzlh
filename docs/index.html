<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>枫叶指令宏文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-toc@1/dist/toc.css">
  <!-- 自定义侧边栏样式 + 右侧目录修复 -->
  <style>
    /* 你的侧边栏样式（保持不变） */
    .sidebar {
      width: 260px;
    }
    .sidebar ul li a {
      font-size: 13px;
      padding: 6px 12px;
    }
    .content {
      left: 260px;
    }

    /* ===== 新增：右侧目录固定样式 ===== */
    .toc {
      position: fixed !important;
      top: 80px !important;
      right: 20px !important;
      width: 260px !important;
      max-height: calc(100vh - 120px) !important;
      overflow-y: auto !important;
      background: #fff !important;
      border-left: 1px solid #eee !important;
      padding: 10px 15px !important;
      z-index: 10 !important;
      box-shadow: -2px 0 5px rgba(0,0,0,0.03);
    }

    /* 内容区右侧留出空白，防止被目录遮挡 */
    .markdown-section {
      margin-right: 280px !important;
    }

    /* 小屏幕（手机/窄窗口）隐藏右侧目录，恢复内容区宽度 */
    @media (max-width: 1000px) {
      .toc {
        display: none !important;
      }
      .markdown-section {
        margin-right: 0 !important;
      }
    }
    /* ===== 结束 ===== */
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '📄 枫叶指令宏文档',
      loadSidebar: true,
      subMaxLevel: 4,          // 改为4，支持到四级标题
      emoji: true,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 4                // 搜索深度也建议改为4
      },
      // 目录插件配置
      toc: {
        scope: '.markdown-section',
        maxDepth: 4,            // 改为4，显示到四级标题
        title: '本页目录'
      }
    }
  </script>
  <!-- 加载 docsify 核心文件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 加载搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 加载 emoji 插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <!-- 加载图片缩放插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <!-- 加载目录插件（路径已修正） -->
  <script src="//cdn.jsdelivr.net/npm/docsify-toc@1/dist/toc.min.js"></script>
</body>
</html>
